<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>FRP Generator - Stacked Index</title>
  <desc>Abstract representation of code lines and reference markers.</desc>
  <!-- Background: Charcoal -->
  <rect width="40" height="40" rx="6" fill="#333333"/>
  <!-- Vertical Index Bar: Burnt Orange -->
  <path d="M13 12V28" stroke="#C86646" stroke-width="3" stroke-linecap="round"/>
  <!-- Code Lines: Paper White -->
  <path d="M20 12H30" stroke="#FDFCF8" stroke-width="2" stroke-linecap="round"/>
  <path d="M20 18H28" stroke="#FDFCF8" stroke-width="2" stroke-linecap="round"/>
  <path d="M20 24H30" stroke="#FDFCF8" stroke-width="2" stroke-linecap="round"/>
  <!-- Highlight Pointer: Sage Green -->
  <circle cx="13" cy="18" r="2.5" fill="#8F9779"/>
</svg>